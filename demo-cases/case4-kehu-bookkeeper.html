<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户记账本 - 小生意人的随身账本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f4f8; color: #1e293b; }
        .header { background: linear-gradient(135deg, #059669, #10b981); color: white; padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .summary-card { background: white; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .summary-card .label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
        .summary-card .value { font-size: 22px; font-weight: 700; }
        .income .value { color: #059669; }
        .expense .value { color: #ef4444; }
        .profit .value { color: #2563eb; }
        .add-form { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .add-form h3 { font-size: 16px; margin-bottom: 12px; }
        .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
        .form-row input:focus, .form-row select:focus { outline: none; border-color: #059669; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: #059669; color: white; width: 100%; }
        .btn-primary:hover { background: #047857; }
        .btn-danger { background: #fee2e2; color: #ef4444; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .records { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .records h3 { font-size: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .record { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .record:last-child { border-bottom: none; }
        .record-info .name { font-weight: 600; font-size: 14px; }
        .record-info .meta { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .record-amount { font-weight: 700; font-size: 16px; }
        .record-amount.income { color: #059669; }
        .record-amount.expense { color: #ef4444; }
        .filter { display: flex; gap: 8px; margin-bottom: 16px; }
        .filter button { flex: 1; padding: 8px; border: 1px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .filter button.active { background: #059669; color: white; border-color: #059669; }
        .export-btn { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .empty { text-align: center; padding: 40px; color: #94a3b8; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 6px; }
        .tag-餐饮 { background: #fef3c7; color: #d97706; }
        .tag-交通 { background: #dbeafe; color: #2563eb; }
        .tag-进货 { background: #fce7f3; color: #db2777; }
        .tag-销售 { background: #d1fae5; color: #059669; }
        .tag-其他 { background: #f1f5f9; color: #64748b; }
        .demo-badge { position: fixed; top: 10px; right: 10px; background: #f59e0b; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 100; }
    </style>
</head>
<body>
    <div class="demo-badge">🎬 演示案例</div>
    <div class="header">
        <h1>📒 客户记账本</h1>
        <p>小生意人的随身账本 · 收入支出一目了然</p>
    </div>
    <div class="container">
        <div class="summary">
            <div class="summary-card income">
                <div class="label">本月收入</div>
                <div class="value" id="totalIncome">¥0</div>
            </div>
            <div class="summary-card expense">
                <div class="label">本月支出</div>
                <div class="value" id="totalExpense">¥0</div>
            </div>
            <div class="summary-card profit">
                <div class="label">净利润</div>
                <div class="value" id="totalProfit">¥0</div>
            </div>
        </div>
        <div class="add-form">
            <h3>➕ 记一笔</h3>
            <div class="form-row">
                <select id="type">
                    <option value="income">💰 收入</option>
                    <option value="expense">💸 支出</option>
                </select>
                <select id="category">
                    <option value="销售">销售</option>
                    <option value="进货">进货</option>
                    <option value="餐饮">餐饮</option>
                    <option value="交通">交通</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            <div class="form-row">
                <input type="number" id="amount" placeholder="金额（元）" step="0.01">
            </div>
            <div class="form-row">
                <input type="text" id="note" placeholder="备注（可选）">
            </div>
            <div class="form-row">
                <button class="btn btn-primary" onclick="addRecord()">记账</button>
            </div>
        </div>
        <div class="records">
            <h3>
                📋 账目明细
                <button class="export-btn" onclick="exportCSV()">📥 导出CSV</button>
            </h3>
            <div class="filter">
                <button class="active" onclick="filterRecords('all', this)">全部</button>
                <button onclick="filterRecords('income', this)">收入</button>
                <button onclick="filterRecords('expense', this)">支出</button>
            </div>
            <div id="recordList"></div>
        </div>
    </div>
    <script>
        let records = JSON.parse(localStorage.getItem('bookkeeping') || '[]');
        let currentFilter = 'all';

        function addRecord() {
            const type = document.getElementById('type').value;
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value;
            if (!amount || amount <= 0) { alert('请输入有效金额'); return; }
            const record = { id: Date.now(), type, category, amount, note, date: new Date().toLocaleDateString('zh-CN') };
            records.unshift(record);
            localStorage.setItem('bookkeeping', JSON.stringify(records));
            document.getElementById('amount').value = '';
            document.getElementById('note').value = '';
            render();
        }

        function deleteRecord(id) {
            if (!confirm('确定删除这条记录？')) return;
            records = records.filter(r => r.id !== id);
            localStorage.setItem('bookkeeping', JSON.stringify(records));
            render();
        }

        function filterRecords(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function exportCSV() {
            let csv = '类型,分类,金额,备注,日期\n';
            records.forEach(r => { csv += `${r.type === 'income' ? '收入' : '支出'},${r.category},${r.amount},${r.note || ''},${r.date}\n`; });
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `记账_${new Date().toLocaleDateString('zh-CN')}.csv`;
            a.click();
        }

        function render() {
            const now = new Date();
            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const income = monthRecords.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
            const expense = monthRecords.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
            document.getElementById('totalIncome').textContent = `¥${income.toFixed(0)}`;
            document.getElementById('totalExpense').textContent = `¥${expense.toFixed(0)}`;
            document.getElementById('totalProfit').textContent = `¥${(income - expense).toFixed(0)}`;

            const filtered = currentFilter === 'all' ? records : records.filter(r => r.type === currentFilter);
            const list = document.getElementById('recordList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">暂无记录，开始记账吧 📝</div>';
                return;
            }
            list.innerHTML = filtered.slice(0, 50).map(r => `
                <div class="record">
                    <div class="record-info">
                        <div class="name">${r.type === 'income' ? '💰' : '💸'} ${r.note || (r.type === 'income' ? '收入' : '支出')}<span class="tag tag-${r.category}">${r.category}</span></div>
                        <div class="meta">${r.date}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px">
                        <span class="record-amount ${r.type}">${r.type === 'income' ? '+' : '-'}¥${r.amount.toFixed(2)}</span>
                        <button class="btn-danger" onclick="deleteRecord(${r.id})">删</button>
                    </div>
                </div>
            `).join('');
        }

        // 预置演示数据
        if (records.length === 0) {
            records = [
                { id: 1, type: 'income', category: '销售', amount: 3200, note: '客户张姐订了3件', date: '2026/3/28' },
                { id: 2, type: 'expense', category: '进货', amount: 1500, note: '春季新款拿货', date: '2026/3/27' },
                { id: 3, type: 'income', category: '销售', amount: 880, note: '微信老客户回购', date: '2026/3/27' },
                { id: 4, type: 'expense', category: '餐饮', amount: 45, note: '午饭外卖', date: '2026/3/27' },
                { id: 5, type: 'expense', category: '交通', amount: 28, note: '去批发市场打车', date: '2026/3/26' },
                { id: 6, type: 'income', category: '销售', amount: 1600, note: '抖音直播卖了2单', date: '2026/3/26' },
            ];
            localStorage.setItem('bookkeeping', JSON.stringify(records));
        }
        render();
    </script>
</body>
</html>
