<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能待办 - AI定制工具演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.8; font-size: 14px; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-area input { flex: 1; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        .input-area input:focus { border-color: #667eea; }
        .input-area select { padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; background: white; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a6fd6; transform: translateY(-1px); }
        .btn-danger { background: #ff4757; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-danger:hover { background: #e8404f; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: 2px solid #e0e0e0; border-radius: 20px; background: white; cursor: pointer; font-size: 14px; transition: all 0.3s; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-num { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #999; margin-top: 4px; }
        .todo-list { display: flex; flex-direction: column; gap: 10px; }
        .todo-item { background: white; padding: 16px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 12px; transition: all 0.3s; }
        .todo-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .todo-item.completed .todo-text { text-decoration: line-through; color: #999; }
        .todo-check { width: 24px; height: 24px; border: 2px solid #ddd; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .todo-check.done { background: #2ed573; border-color: #2ed573; color: white; }
        .todo-text { flex: 1; font-size: 16px; }
        .todo-meta { display: flex; align-items: center; gap: 8px; }
        .priority-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .priority-high { background: #fff0f0; color: #ff4757; }
        .priority-medium { background: #fff8e1; color: #ffa502; }
        .priority-low { background: #f0fff0; color: #2ed573; }
        .ai-suggest { background: linear-gradient(135deg, #e8f5e9 0%, #f3e5f5 100%); border: 2px dashed #667eea; border-radius: 10px; padding: 16px; margin-bottom: 20px; }
        .ai-suggest h3 { color: #667eea; font-size: 14px; margin-bottom: 8px; }
        .ai-suggest p { font-size: 13px; color: #666; line-height: 1.6; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }
        .tag { display: inline-block; padding: 2px 8px; background: #f0f0f0; border-radius: 4px; font-size: 11px; color: #666; margin-left: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 智能待办事项</h1>
        <p>AI自动优先级排序 · 智能提醒 · 数据本地存储</p>
    </div>
    <div class="container">
        <div class="ai-suggest" id="aiSuggest">
            <h3>🤖 AI建议</h3>
            <p id="suggestText">加载中...</p>
        </div>

        <div class="input-area">
            <input type="text" id="todoInput" placeholder="输入待办事项..." onkeypress="if(event.key==='Enter')addTodo()">
            <select id="prioritySelect">
                <option value="medium">中优先</option>
                <option value="high">高优先</option>
                <option value="low">低优先</option>
            </select>
            <button class="btn btn-primary" onclick="addTodo()">添加</button>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">总计</div></div>
            <div class="stat-card"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">待完成</div></div>
            <div class="stat-card"><div class="stat-num" id="doneCount">0</div><div class="stat-label">已完成</div></div>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all',this)">全部</button>
            <button class="filter-btn" onclick="setFilter('pending',this)">待完成</button>
            <button class="filter-btn" onclick="setFilter('high',this)">🔴 高优先</button>
            <button class="filter-btn" onclick="setFilter('done',this)">已完成</button>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <script>
        let todos = JSON.parse(localStorage.getItem('smart-todos') || '[]');
        let currentFilter = 'all';

        function saveTodos() {
            localStorage.setItem('smart-todos', JSON.stringify(todos));
            updateStats();
            renderTodos();
            generateAISuggestion();
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();
            if (!text) return;
            todos.push({ id: Date.now(), text, priority, done: false, createdAt: new Date().toISOString() });
            input.value = '';
            saveTodos();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) { todo.done = !todo.done; saveTodos(); }
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            saveTodos();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTodos();
        }

        function getFiltered() {
            let list = [...todos];
            if (currentFilter === 'pending') list = list.filter(t => !t.done);
            else if (currentFilter === 'high') list = list.filter(t => t.priority === 'high' && !t.done);
            else if (currentFilter === 'done') list = list.filter(t => t.done);
            // AI auto-sort: high priority first, then medium, then low
            const order = { high: 0, medium: 1, low: 2 };
            list.sort((a, b) => (a.done - b.done) || (order[a.priority] - order[b.priority]));
            return list;
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            const filtered = getFiltered();
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="emoji">✨</div><p>暂无待办事项，添加一个试试！</p></div>';
                return;
            }
            list.innerHTML = filtered.map(t => `
                <div class="todo-item ${t.done ? 'completed' : ''}">
                    <div class="todo-check ${t.done ? 'done' : ''}" onclick="toggleTodo(${t.id})">${t.done ? '✓' : ''}</div>
                    <div class="todo-text">${escapeHtml(t.text)}</div>
                    <div class="todo-meta">
                        <span class="priority-badge priority-${t.priority}">${t.priority === 'high' ? '🔴高' : t.priority === 'medium' ? '🟡中' : '🟢低'}</span>
                        <button class="btn btn-danger" onclick="deleteTodo(${t.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = todos.length;
            document.getElementById('pendingCount').textContent = todos.filter(t => !t.done).length;
            document.getElementById('doneCount').textContent = todos.filter(t => t.done).length;
        }

        function generateAISuggestion() {
            const pending = todos.filter(t => !t.done);
            const highPriority = pending.filter(t => t.priority === 'high');
            const el = document.getElementById('suggestText');
            if (pending.length === 0) {
                el.textContent = '🎉 所有任务已完成！今天效率很高，休息一下吧~';
            } else if (highPriority.length > 0) {
                el.textContent = `⚠️ 你有 ${highPriority.length} 个高优先级任务待完成，建议先处理「${highPriority[0].text}」。专注一次只做一件事！`;
            } else if (pending.length > 5) {
                el.textContent = `📊 你有 ${pending.length} 个待办事项，建议每天专注3-5个核心任务，避免多线程低效率。`;
            } else {
                el.textContent = `✅ 任务量适中，保持节奏！今天剩余 ${pending.length} 个任务待完成。`;
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Init
        updateStats();
        renderTodos();
        generateAISuggestion();
    </script>
</body>
</html>
